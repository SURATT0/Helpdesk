name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: deskly
          POSTGRES_PASSWORD: deskly
          POSTGRES_DB: deskly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deskly -d deskly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://deskly:deskly@localhost:5432/deskly_test?schema=public
      TEST_DATABASE_URL: postgresql://deskly:deskly@localhost:5432/deskly_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
      - run: npm run build

  frontend:
    name: Frontend (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (Playwright · full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Start the full stack
        run: docker compose up -d --build
      - name: Wait for api + web
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/api/v1/ready >/dev/null \
               && curl -s http://localhost:3000 >/dev/null; then
              echo "stack is up"; exit 0
            fi
            sleep 3
          done
          echo "services did not become ready"; docker compose logs --tail=120; exit 1
      - name: Seed the database
        run: docker compose exec -T api npm run db:seed
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps + browser
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
      - name: Tear down
        if: always()
        run: docker compose down -v
