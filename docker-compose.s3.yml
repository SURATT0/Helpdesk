# S3 variant of the stack — swaps attachment storage from the local named volume
# to a MinIO (S3-compatible) server, so the S3Storage adapter can be exercised
# end-to-end locally. This is an OVERRIDE; run it layered on the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.s3.yml up -d --build
#
# The base stack (docker compose up) is unchanged and still uses LocalStorage.
services:
  minio:
    image: minio/minio:latest
    container_name: deskly-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - deskly-minio:/data

  # One-shot: wait for MinIO, then create the attachments bucket (idempotent).
  minio-init:
    image: minio/mc:latest
    container_name: deskly-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "waiting for minio..."; sleep 1;
        done
        mc mb --ignore-existing local/deskly-attachments
        echo "bucket ready"

  api:
    environment:
      STORAGE_DRIVER: s3
      S3_BUCKET: deskly-attachments
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  deskly-minio:
