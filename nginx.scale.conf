# Load balancer in front of the API replicas (docker-compose.scale.yml).
# Re-resolves the `api` service name via Docker's embedded DNS on every request,
# so traffic round-robins across all live replicas (and picks up scale changes).
server {
    listen 4000;

    # Docker embedded DNS. `valid` keeps the record fresh as replicas come/go.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Liveness for the load balancer itself (served by nginx, no upstream call).
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        # A variable in proxy_pass forces per-request re-resolution (OSS nginx
        # would otherwise resolve the upstream once at startup and pin one IP).
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (comment stream): stream chunks straight through, hold the
        # connection open, and don't let nginx buffer or time it out early.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
